---
layout: default
---
<article class="post">
  <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time></p>
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-body">
    {{ content }}
  </div>
  <p class="back-link"><a href="{{ '/' | relative_url }}">cd ..</a></p>
</article>
